id: gcp_setup_hw
namespace: zoomcamp

# Sets up the required GCP infrastructure for the zoomcamp project.
# Reads credentials and config from Kestra secrets/KV store so nothing
# sensitive is hardcoded in the flow.

tasks:
  # Creates a GCS bucket in the configured region. Skips silently if it already exists.
  - id: create_gcs_bucket
    type: io.kestra.plugin.gcp.gcs.CreateBucket
    ifExists: SKIP
    storageClass: REGIONAL
    name: "{{ kv('GCP_BUCKET_NAME_HW') }}"

  # Creates a BigQuery dataset. Skips silently if it already exists.
  - id: create_bq_dataset
    type: io.kestra.plugin.gcp.bigquery.CreateDataset
    name: "{{ kv('GCP_DATASET_HW') }}"
    ifExists: SKIP

# Applies these GCP auth/config values to every io.kestra.plugin.gcp task above,
# so they don't need to be repeated on each task individually.
pluginDefaults:
  - type: io.kestra.plugin.gcp
    values:
      serviceAccount: "{{ secret('GCP_SERVICE_ACCOUNT')}}"  # JSON key from Kestra secret store
      projectId: "{{ kv('GCP_PROJECT_ID') }}"               # GCP project ID from KV store
      location: "{{ kv('GCP_LOCATION') }}"                  # e.g. US, EU, or a specific region
      bucket: "{{ kv('GCP_BUCKET_NAME_HW') }}"                 # default bucket for GCS tasks