id: print_gcp_key
namespace: zoomcamp

# title: Print GCP Service Account Key
# description: A simple workflow to print the encoded GCP Service Account key from a secret.
# Just for testing. Do not use this in production as it exposes sensitive information.

tasks:
  - id: print_encoded_key
    type: io.kestra.plugin.scripts.shell.Commands
    env:
      GCP_SA_KEY: "{{ secret('GCP_SERVICE_ACCOUNT') }}"
    commands:
      - echo "Encoded GCP Service Account Key:"
      - id: print_gcp_key
namespace: zoomcamp

tasks:
  - id: print_encoded_key
    type: io.kestra.plugin.scripts.shell.Commands
    env:
      GCP_SA_KEY: "{{ secret('GCP_SERVICE_ACCOUNT') }}"
    commands:
      - echo "Encoded GCP Service Account Key (First 20 characters):"
      - echo "$GCP_SA_KEY" | cut -c 1-20
