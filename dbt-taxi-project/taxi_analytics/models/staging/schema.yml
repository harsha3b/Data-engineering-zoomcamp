# models/staging/schema.yml
version: 2

models:
  - name: stg_green_tripdata
    description: "Cleaned, deduplicated green taxi trip data. One row per trip. Renamed columns, safely cast IDs, deduplicated on unique_row_id."
    columns:
      - name: unique_row_id
        description: "Unique identifier for each raw trip record, used for deduplication."
        tests:
          - unique
          - not_null
      - name: pickup_location_id
        description: "Foreign key to stg_zones, indicating where the trip started."
        tests:
          - relationships:
              arguments:
                to: ref('stg_zones')
                field: location_id
      - name: dropoff_location_id
        description: "Foreign key to stg_zones, indicating where the trip ended."
        tests:
          - relationships:
              arguments:
                to: ref('stg_zones')
                field: location_id

  - name: stg_zones
    description: "Cleaned taxi zone lookup, one row per NYC taxi zone."
    columns:
      - name: location_id
        description: "Unique identifier for a taxi zone."
        tests:
          - unique
          - not_null